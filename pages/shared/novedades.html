<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novedades — CE Digital N°57</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <style>
    /* ── Modal de confirmación / formulario ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.activo { display: flex; }
    .modal-box {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: modalIn .18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-box__title {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    .modal-box__desc {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-lg);
      line-height: 1.6;
    }
    .modal-box__actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 20px;
      background: none; border: none;
      cursor: pointer;
      color: var(--color-text-muted);
    }
    /* ── Botón eliminar en cada card ── */
    .btn-eliminar-card {
      background: none;
      border: 1px solid var(--color-danger, #e53e3e);
      color: var(--color-danger, #e53e3e);
      border-radius: var(--radius-sm);
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-eliminar-card:hover { background: rgba(229,62,62,.08); }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <main class="page-wrapper">

    <div class="page-header">
      <div>
        <h1 class="page-title">Novedades</h1>
        <p class="page-subtitle">Últimas noticias y avisos del instituto</p>
      </div>
      <!-- Botón visible solo para admin/delegado -->
      <div id="btn-nueva-novedad" style="display:none;">
        <button class="btn btn--primary" onclick="abrirModalAgregar()">+ Nueva novedad</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters-bar">
      <span class="filters-bar__label">Filtrar:</span>
      <button class="btn btn--sm btn--accent" data-filtro="todos" onclick="filtrar('todos')">Todas</button>
      <button class="btn btn--sm btn--ghost" data-filtro="academico" onclick="filtrar('academico')">📚 Académico</button>
      <button class="btn btn--sm btn--ghost" data-filtro="social" onclick="filtrar('social')">🎉 Social</button>
      <button class="btn btn--sm btn--ghost" data-filtro="institucional" onclick="filtrar('institucional')">🏫 Institucional</button>
      <button class="btn btn--sm btn--ghost" data-filtro="urgente" onclick="filtrar('urgente')">🔴 Urgente</button>
      <div style="margin-left:auto;">
        <input class="form-input" type="search" id="buscador" placeholder="Buscar..."
               style="width:200px; padding:6px 12px;">
      </div>
    </div>

    <div id="alert-global" class="alert" style="display:none;"></div>
    <div id="contenedor-novedades" class="stack"><div class="spinner"></div></div>

  </main>

  <!-- ══════════════════════════════════════
       MODAL: Confirmar eliminación
  ══════════════════════════════════════ -->
  <div id="modal-confirmar" class="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" onclick="cerrarModalConfirmar()">✕</button>
      <div class="modal-box__title">⚠️ Eliminar novedad</div>
      <div class="modal-box__desc" id="modal-confirmar-desc"></div>
      <div class="modal-box__actions">
        <button class="btn btn--ghost btn--sm" onclick="cerrarModalConfirmar()">Cancelar</button>
        <button class="btn btn--sm" id="btn-confirmar-ok"
                style="background:var(--color-danger,#e53e3e); color:#fff; border:none;">
          Sí, eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL: Agregar novedad
  ══════════════════════════════════════ -->
  <div id="modal-agregar" class="modal-overlay">
    <div class="modal-box" style="max-width:540px;">
      <button class="modal-close" onclick="cerrarModalAgregar()">✕</button>
      <div class="modal-box__title">+ Nueva novedad</div>

      <div class="stack" style="gap:14px; margin-bottom:var(--space-lg);">
        <div>
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Título *</label>
          <input class="form-input" id="nueva-titulo" type="text" placeholder="Ej: Cambio de horario de guardería" style="width:100%;">
        </div>
        <div>
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Contenido *</label>
          <textarea class="form-input" id="nueva-contenido" rows="4"
                    placeholder="Describí la novedad..."
                    style="width:100%; resize:vertical;"></textarea>
        </div>
        <div style="display:flex; gap:12px;">
          <div style="flex:1;">
            <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Categoría *</label>
            <select class="form-input" id="nueva-categoria" style="width:100%;">
              <option value="academico">📚 Académico</option>
              <option value="social">🎉 Social</option>
              <option value="institucional">🏫 Institucional</option>
              <option value="urgente">🔴 Urgente</option>
            </select>
          </div>
          <div style="flex:1; display:flex; align-items:flex-end; padding-bottom:2px;">
            <label style="font-size:13px; display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="nueva-destacada"> Marcar como destacada ⭐
            </label>
          </div>
        </div>
      </div>

      <div class="modal-box__actions">
        <button class="btn btn--ghost btn--sm" onclick="cerrarModalAgregar()">Cancelar</button>
        <button class="btn btn--primary btn--sm" onclick="confirmarAgregar()">Publicar novedad</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/router.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script>
    Router.verificarAcceso();
    Router.renderNavbar();

    const perfil = Auth.getPerfil();
    const esAdmin = perfil === 'admin' || perfil === 'delegado';
    if (esAdmin) document.getElementById('btn-nueva-novedad').style.display = 'block';

    let todasLasNovedades = [];
    let filtroActivo = 'todos';
    let novedadAEliminar = null;

    async function cargarNovedades() {
      todasLasNovedades = await API.getNovedades();
      todasLasNovedades.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      renderizar(todasLasNovedades);
    }

    function filtrar(categoria) {
      filtroActivo = categoria;
      document.querySelectorAll('[data-filtro]').forEach(btn => {
        btn.className = btn.dataset.filtro === categoria
          ? 'btn btn--sm btn--accent'
          : 'btn btn--sm btn--ghost';
      });
      aplicarFiltros();
    }

    function aplicarFiltros() {
      const busqueda = document.getElementById('buscador').value.toLowerCase();
      let resultado = todasLasNovedades;
      if (filtroActivo !== 'todos') resultado = resultado.filter(n => n.categoria === filtroActivo);
      if (busqueda) resultado = resultado.filter(n =>
        n.titulo.toLowerCase().includes(busqueda) ||
        n.contenido.toLowerCase().includes(busqueda)
      );
      renderizar(resultado);
    }

    function renderizar(novedades) {
      const contenedor = document.getElementById('contenedor-novedades');
      if (novedades.length === 0) {
        contenedor.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">📭</div>
            <div class="empty-state__title">Sin resultados</div>
            <div class="empty-state__text">No hay novedades que coincidan con el filtro seleccionado.</div>
          </div>`;
        return;
      }

      contenedor.innerHTML = novedades.map(n => `
        <div class="novedad-card novedad-card--${n.categoria} ${n.destacada ? 'novedad-card--destacada' : ''}">
          <div class="card__header">
            <div>
              ${n.destacada ? '<span style="font-size:11px;color:var(--color-primary-light);font-weight:600;">⭐ DESTACADA &nbsp;</span>' : ''}
              <h3 class="card__title" style="font-size:16px;">${n.titulo}</h3>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="badge badge--${n.categoria}" style="white-space:nowrap;">
                ${Utils.capitalizar(n.categoria)}
              </span>
              ${esAdmin
                ? `<button class="btn-eliminar-card" data-id="${n.id}" data-titulo="${n.titulo.replace(/"/g,'&quot;')}" onclick="pedirEliminarNovedad(this)">
                     🗑 Eliminar
                   </button>`
                : ''}
            </div>
          </div>
          <p class="card__body" style="margin:8px 0 12px;">${Utils.truncar(n.contenido, 200)}</p>
          <div class="card__meta">
            <span>🕐 ${Utils.tiempoRelativo(n.fecha)}</span>
            ${n.materia_id ? '<span>📖 Materia específica</span>' : ''}
            <a href="#" class="btn btn--sm btn--ghost" style="margin-left:auto; padding:4px 10px;">
              Ver completa →
            </a>
          </div>
        </div>
      `).join('');
    }

    /* ── Modal: Agregar ── */
    function abrirModalAgregar() {
      document.getElementById('nueva-titulo').value = '';
      document.getElementById('nueva-contenido').value = '';
      document.getElementById('nueva-categoria').value = 'academico';
      document.getElementById('nueva-destacada').checked = false;
      document.getElementById('modal-agregar').classList.add('activo');
    }
    function cerrarModalAgregar() {
      document.getElementById('modal-agregar').classList.remove('activo');
    }
    function confirmarAgregar() {
      const titulo   = document.getElementById('nueva-titulo').value.trim();
      const contenido = document.getElementById('nueva-contenido').value.trim();
      const categoria = document.getElementById('nueva-categoria').value;
      const destacada = document.getElementById('nueva-destacada').checked;

      if (!titulo || !contenido) {
        alert('Por favor completá el título y el contenido.');
        return;
      }

      const nueva = {
        id: Date.now(),
        titulo,
        contenido,
        categoria,
        destacada,
        fecha: new Date().toISOString().split('T')[0],
        materia_id: null
      };

      todasLasNovedades.unshift(nueva);
      cerrarModalAgregar();
      aplicarFiltros();
      Utils.mostrarAlerta(`Novedad "${titulo}" publicada correctamente.`, 'success');
    }

    /* ── Modal: Confirmar eliminación ── */
    function pedirEliminarNovedad(btn) {
      novedadAEliminar = parseInt(btn.dataset.id);
      const titulo = btn.dataset.titulo;
      document.getElementById('modal-confirmar-desc').textContent =
        `¿Estás seguro que querés eliminar la novedad "${titulo}"? Esta acción no se puede deshacer.`;
      document.getElementById('btn-confirmar-ok').onclick = ejecutarEliminar;
      document.getElementById('modal-confirmar').classList.add('activo');
    }
    function cerrarModalConfirmar() {
      novedadAEliminar = null;
      document.getElementById('modal-confirmar').classList.remove('activo');
    }
    function ejecutarEliminar() {
      todasLasNovedades = todasLasNovedades.filter(n => n.id !== novedadAEliminar);
      cerrarModalConfirmar();
      aplicarFiltros();
      Utils.mostrarAlerta('Novedad eliminada.', 'info');
    }

    /* Cerrar modales al hacer clic en el overlay */
    document.getElementById('modal-confirmar').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-confirmar')) cerrarModalConfirmar();
    });
    document.getElementById('modal-agregar').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-agregar')) cerrarModalAgregar();
    });

    document.getElementById('buscador').addEventListener('input', aplicarFiltros);
    cargarNovedades();
  </script>
  <script src="../../js/chatbot.js"></script>
  <script>Chatbot.init();</script>
</body>
</html>
