<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario — CE Digital N°57</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/calendario.css">
  <style>
    /* ── Modales ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.activo { display: flex; }
    .modal-box {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: modalIn .18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-box__title { font-size:17px; font-weight:700; color:var(--color-primary); margin-bottom:8px; }
    .modal-box__desc  { font-size:14px; color:var(--color-text-muted); margin-bottom:var(--space-lg); line-height:1.6; }
    .modal-box__actions { display:flex; justify-content:flex-end; gap:10px; }
    .modal-close {
      position: absolute; top:14px; right:16px;
      font-size:20px; background:none; border:none;
      cursor:pointer; color:var(--color-text-muted);
    }
    /* ── Chip con botón eliminar (solo admin/delegado) ── */
    .chip-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
    }
    .chip-del {
      background: rgba(0,0,0,0.25);
      border: none;
      color: #fff;
      border-radius: 3px;
      font-size: 10px;
      padding: 1px 4px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }
    .chip-del:hover { background: rgba(229,62,62,.7); }
    /* ── Botón eliminar en "Próximas fechas" ── */
    .btn-eliminar-fecha {
      background: none;
      border: 1px solid var(--color-danger, #e53e3e);
      color: var(--color-danger, #e53e3e);
      border-radius: var(--radius-sm);
      font-size: 12px; padding: 3px 10px;
      cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .btn-eliminar-fecha:hover { background: rgba(229,62,62,.08); }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <main class="page-wrapper">

    <div class="page-header">
      <div>
        <h1 class="page-title">Calendario académico</h1>
        <p class="page-subtitle">Fechas importantes, parciales, finales y eventos</p>
      </div>
      <!-- Botón visible solo para admin/delegado -->
      <div id="btn-nueva-fecha" style="display:none;">
        <button class="btn btn--primary" onclick="abrirModalAgregar()">+ Agregar fecha</button>
      </div>
    </div>

    <div id="leyenda" class="leyenda"></div>

    <div class="cal-nav">
      <button class="btn btn--ghost btn--sm" onclick="cambiarMes(-1)">← Anterior</button>
      <h2 id="titulo-mes"></h2>
      <button class="btn btn--ghost btn--sm" onclick="cambiarMes(1)">Siguiente →</button>
      <button class="btn btn--sm btn--outline" onclick="irAHoy()" style="margin-left:auto;">Hoy</button>
    </div>

    <div class="cal-grid" id="cal-headers" style="margin-bottom:4px;">
      <div class="cal-header-day">Dom</div>
      <div class="cal-header-day">Lun</div>
      <div class="cal-header-day">Mar</div>
      <div class="cal-header-day">Mié</div>
      <div class="cal-header-day">Jue</div>
      <div class="cal-header-day">Vie</div>
      <div class="cal-header-day">Sáb</div>
    </div>

    <div class="cal-grid" id="cal-body"></div>

    <div style="margin-top:var(--space-xl);">
      <h2 style="font-size:18px; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-md);">
        Próximas fechas
      </h2>
      <div id="proximas-fechas" class="stack"></div>
    </div>

  </main>

  <!-- Tooltip de evento -->
  <div id="tooltip" style="display:none; position:fixed; background:var(--color-surface);
       border:1px solid var(--color-border); border-radius:var(--radius-md); padding:12px 16px;
       box-shadow:var(--shadow-md); z-index:300; max-width:260px; font-size:13px;">
  </div>

  <!-- ══════════════════════════════════════
       MODAL: Confirmar eliminación
  ══════════════════════════════════════ -->
  <div id="modal-confirmar" class="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" onclick="cerrarModalConfirmar()">✕</button>
      <div class="modal-box__title">⚠️ Eliminar fecha</div>
      <div class="modal-box__desc" id="modal-confirmar-desc"></div>
      <div class="modal-box__actions">
        <button class="btn btn--ghost btn--sm" onclick="cerrarModalConfirmar()">Cancelar</button>
        <button class="btn btn--sm" id="btn-confirmar-ok"
                style="background:var(--color-danger,#e53e3e); color:#fff; border:none;">
          Sí, eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL: Agregar fecha
  ══════════════════════════════════════ -->
  <div id="modal-agregar" class="modal-overlay">
    <div class="modal-box" style="max-width:520px;">
      <button class="modal-close" onclick="cerrarModalAgregar()">✕</button>
      <div class="modal-box__title">+ Agregar fecha al calendario</div>

      <div class="stack" style="gap:14px; margin-bottom:var(--space-lg);">
        <div>
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Título *</label>
          <input class="form-input" id="nueva-titulo" type="text"
                 placeholder="Ej: Parcial Matemáticas" style="width:100%;">
        </div>
        <div>
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Descripción</label>
          <input class="form-input" id="nueva-descripcion" type="text"
                 placeholder="Ej: Aula 3 — 2do año" style="width:100%;">
        </div>
        <div style="display:flex; gap:12px;">
          <div style="flex:1;">
            <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Fecha *</label>
            <input class="form-input" id="nueva-fecha" type="date" style="width:100%;">
          </div>
          <div style="flex:1;">
            <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Tipo *</label>
            <select class="form-input" id="nueva-tipo" style="width:100%;"></select>
          </div>
        </div>
      </div>

      <div class="modal-box__actions">
        <button class="btn btn--ghost btn--sm" onclick="cerrarModalAgregar()">Cancelar</button>
        <button class="btn btn--primary btn--sm" onclick="confirmarAgregar()">Guardar fecha</button>
      </div>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/router.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script>
    Router.verificarAcceso();
    Router.renderNavbar();

    const perfil  = Auth.getPerfil();
    const esAdmin = perfil === 'admin' || perfil === 'delegado';
    if (esAdmin) document.getElementById('btn-nueva-fecha').style.display = 'block';

    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    let fechasDB   = [];
    let tiposDB    = [];
    let mesActual  = new Date().getMonth();
    let anioActual = new Date().getFullYear();
    let fechaAEliminar = null;

    async function iniciar() {
      [fechasDB, tiposDB] = await Promise.all([
        API.getFechas(), API.getTiposCalendario()
      ]);
      renderLeyenda();
      renderCalendario();
      renderProximasFechas();
      // Poblar selector de tipos en el modal
      document.getElementById('nueva-tipo').innerHTML =
        tiposDB.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
    }

    function renderLeyenda() {
      document.getElementById('leyenda').innerHTML = tiposDB.map(t => `
        <div class="leyenda-item">
          <div class="leyenda-dot" style="background:${t.color}"></div>
          <span>${t.nombre}</span>
        </div>
      `).join('');
    }

    function renderCalendario() {
      document.getElementById('titulo-mes').textContent = `${MESES[mesActual]} ${anioActual}`;

      const primerDia = new Date(anioActual, mesActual, 1).getDay();
      const diasEnMes = new Date(anioActual, mesActual + 1, 0).getDate();
      const diasMesAnterior = new Date(anioActual, mesActual, 0).getDate();
      const hoy = new Date();

      let celdas = [];
      for (let i = primerDia - 1; i >= 0; i--)
        celdas.push({ dia: diasMesAnterior - i, otroMes: true });
      for (let d = 1; d <= diasEnMes; d++)
        celdas.push({ dia: d, otroMes: false });
      while (celdas.length % 7 !== 0)
        celdas.push({ dia: celdas.length - diasEnMes - primerDia + 1, otroMes: true });

      const body = document.getElementById('cal-body');
      body.innerHTML = celdas.map(celda => {
        const esHoy = !celda.otroMes
          && celda.dia === hoy.getDate()
          && mesActual === hoy.getMonth()
          && anioActual === hoy.getFullYear();

        const fechaStr = `${anioActual}-${String(mesActual+1).padStart(2,'0')}-${String(celda.dia).padStart(2,'0')}`;
        const eventosDia = fechasDB.filter(f => f.fecha === fechaStr);

        const chips = eventosDia.map(ev => {
          const tipo  = tiposDB.find(t => t.id === ev.tipo);
          const color = tipo ? tipo.color : '#888';

          if (esAdmin) {
            // Chip con botón eliminar inline
            return `
              <div class="chip-wrap">
                <div class="cal-evento-chip" style="background:${color}; flex:1; margin-bottom:0;"
                     onclick="mostrarTooltip(event, ${ev.id})" title="${ev.titulo}">
                  ${ev.titulo}
                </div>
                <button class="chip-del" title="Eliminar"
                        data-id="${ev.id}" data-titulo="${ev.titulo.replace(/"/g,'&quot;')}"
                        onclick="event.stopPropagation(); pedirEliminarFecha(this)">
                  ✕
                </button>
              </div>`;
          }
          return `<div class="cal-evento-chip" style="background:${color};"
                       onclick="mostrarTooltip(event, ${ev.id})" title="${ev.titulo}">
                    ${ev.titulo}
                  </div>`;
        }).join('');

        return `
          <div class="cal-cell ${celda.otroMes ? 'cal-cell--otro-mes' : ''} ${esHoy ? 'cal-cell--hoy' : ''}">
            <div class="cal-cell__num">${celda.dia}</div>
            ${chips}
          </div>`;
      }).join('');
    }

    function mostrarTooltip(event, fechaId) {
      const fecha = fechasDB.find(f => f.id === fechaId);
      if (!fecha) return;
      const tipo = tiposDB.find(t => t.id === fecha.tipo);
      const tooltip = document.getElementById('tooltip');
      tooltip.innerHTML = `
        <div style="font-weight:600; margin-bottom:4px; color:${tipo ? tipo.color : '#333'};">
          ${tipo ? tipo.nombre : ''} — ${Utils.formatearFechaCorta(fecha.fecha)}
        </div>
        <div style="font-weight:500; margin-bottom:4px;">${fecha.titulo}</div>
        <div style="color:var(--color-text-muted);">${fecha.descripcion}</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = Math.min(event.clientX + 10, window.innerWidth - 280) + 'px';
      tooltip.style.top  = (event.clientY - 10) + 'px';
      event.stopPropagation();
    }
    document.addEventListener('click', () => {
      document.getElementById('tooltip').style.display = 'none';
    });

    function renderProximasFechas() {
      const hoy = new Date(); hoy.setHours(0,0,0,0);
      const proximas = fechasDB
        .filter(f => new Date(f.fecha) >= hoy)
        .sort((a, b) => new Date(a.fecha) - new Date(b.fecha))
        .slice(0, 5);

      document.getElementById('proximas-fechas').innerHTML = proximas.map(f => {
        const tipo  = tiposDB.find(t => t.id === f.tipo);
        const color = tipo ? tipo.color : '#888';
        return `
          <div class="novedad-card" style="border-left-color:${color};">
            <div class="flex-between">
              <h4 style="font-size:15px; font-weight:600;">${f.titulo}</h4>
              <div style="display:flex; align-items:center; gap:10px;">
                <span class="badge" style="background:${color}20; color:${color};">${tipo ? tipo.nombre : ''}</span>
                ${esAdmin
                  ? `<button class="btn-eliminar-fecha"
                       data-id="${f.id}" data-titulo="${f.titulo.replace(/"/g,'&quot;')}"
                       onclick="pedirEliminarFecha(this)">
                       🗑 Eliminar
                     </button>`
                  : ''}
              </div>
            </div>
            <p class="card__meta" style="margin-top:4px;">
              📅 ${Utils.formatearFecha(f.fecha)}
              ${f.descripcion ? ' · ' + f.descripcion : ''}
            </p>
          </div>`;
      }).join('');
    }

    /* ── Modal: Confirmar eliminación ── */
    function pedirEliminarFecha(btn) {
      fechaAEliminar = parseInt(btn.dataset.id);
      const titulo = btn.dataset.titulo;
      document.getElementById('modal-confirmar-desc').textContent =
        `¿Estás seguro que querés eliminar la fecha "${titulo}"? Esta acción no se puede deshacer.`;
      document.getElementById('btn-confirmar-ok').onclick = ejecutarEliminar;
      document.getElementById('modal-confirmar').classList.add('activo');
    }
    function cerrarModalConfirmar() {
      fechaAEliminar = null;
      document.getElementById('modal-confirmar').classList.remove('activo');
    }
    function ejecutarEliminar() {
      fechasDB = fechasDB.filter(f => f.id !== fechaAEliminar);
      cerrarModalConfirmar();
      renderCalendario();
      renderProximasFechas();
      Utils.mostrarAlerta('Fecha eliminada del calendario.', 'info');
    }

    /* ── Modal: Agregar fecha ── */
    function abrirModalAgregar() {
      document.getElementById('nueva-titulo').value = '';
      document.getElementById('nueva-descripcion').value = '';
      document.getElementById('nueva-fecha').value = '';
      if (tiposDB.length) document.getElementById('nueva-tipo').value = tiposDB[0].id;
      document.getElementById('modal-agregar').classList.add('activo');
    }
    function cerrarModalAgregar() {
      document.getElementById('modal-agregar').classList.remove('activo');
    }
    function confirmarAgregar() {
      const titulo      = document.getElementById('nueva-titulo').value.trim();
      const descripcion = document.getElementById('nueva-descripcion').value.trim();
      const fecha       = document.getElementById('nueva-fecha').value;
      const tipo        = parseInt(document.getElementById('nueva-tipo').value);

      if (!titulo || !fecha) {
        alert('Por favor completá el título y la fecha.');
        return;
      }
      fechasDB.push({ id: Date.now(), titulo, descripcion, fecha, tipo });
      cerrarModalAgregar();
      renderCalendario();
      renderProximasFechas();
      Utils.mostrarAlerta(`Fecha "${titulo}" agregada al calendario.`, 'success');
    }

    /* Cerrar modales al clickear overlay */
    ['modal-confirmar','modal-agregar'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target.id === id) document.getElementById(id).classList.remove('activo');
      });
    });

    function cambiarMes(delta) {
      mesActual += delta;
      if (mesActual < 0)  { mesActual = 11; anioActual--; }
      if (mesActual > 11) { mesActual = 0;  anioActual++; }
      renderCalendario();
    }
    function irAHoy() {
      mesActual  = new Date().getMonth();
      anioActual = new Date().getFullYear();
      renderCalendario();
    }

    iniciar();
  </script>
  <script src="../../js/chatbot.js"></script>
  <script>Chatbot.init();</script>
</body>
</html>
