<!DOCTYPE html>
<html lang="es">

<head>

  <!-- META -->
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- TITULO -->
  <title>
    Contacto | Centro de Estudiantes
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/contacto.css"
  >

</head>

<body>

  <!-- HEADER -->
  <header class="contact-header">

    <h1 class="contact-title">
      Contacto
    </h1>

    <p class="contact-subtitle">
      Centro de Estudiantes - Instituto Superior N°57
    </p>

  </header>

  <!-- CONTENEDOR -->
  <main class="contact-container">

    <!-- INFORMACION -->
    <section class="contact-card">

      <h2 class="card-title">
        Información Institucional
      </h2>

      <div class="contact-info">

        <div class="info-item">

          <h4>
            Dirección
          </h4>

          <p>
            Instituto Superior N°57
          </p>

        </div>

        <div class="info-item">

          <h4>
            Correo
          </h4>

          <p>
            centroestudiantes57@gmail.com
          </p>

        </div>

        <div class="info-item">

          <h4>
            Horarios
          </h4>

          <p>
            Lunes a Viernes - 18:00 a 22:00 hs
          </p>

        </div>

      </div>

    </section>

    <!-- FORMULARIO -->
    <section class="contact-card">

      <h2 class="card-title">
        Enviar Mensaje
      </h2>

      <form
        id="contactForm"
        class="contact-form"
      >

        <input
          type="text"
          id="nombre"
          placeholder="Nombre completo"
          required
        >

        <input
          type="email"
          id="correo"
          placeholder="Correo electrónico"
          required
        >

        <textarea
          id="mensaje"
          placeholder="Escriba su mensaje..."
          required
        ></textarea>

        <button
          type="submit"
          class="btn-contact"
        >

          Enviar Mensaje

        </button>

      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="contact-footer">

    <p>
      © 2026 - Centro de Estudiantes Instituto N°57
    </p>

  </footer>

  <!-- JAVASCRIPT -->
  <script src="js/contacto.js"></script>

</body>
</html>
