<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Eventos — CE Digital N°57</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
</head>
<body>

  <div id="navbar"></div>

  <main class="page-wrapper">

    <div class="page-header">
      <div>
        <h1 class="page-title">Gestión de eventos</h1>
        <p class="page-subtitle">Creá y administrá los eventos del Centro de Estudiantes</p>
      </div>
      <button class="btn btn--primary" onclick="abrirFormulario()">+ Nuevo evento</button>
    </div>

    <div id="alert-global" class="alert" style="display:none;"></div>

    <div class="layout-sidebar">

      <!-- Formulario -->
      <div>
        <div class="card" id="panel-formulario" style="display:none; margin-bottom:var(--space-lg);">
          <h3 id="form-titulo" style="font-size:16px; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-lg);">
            Nuevo evento
          </h3>

          <form id="form-evento" novalidate>
            <input type="hidden" id="input-id">

            <div class="form-group">
              <label class="form-label" for="input-titulo">Título del evento *</label>
              <input class="form-input" type="text" id="input-titulo"
                     placeholder="Ej: Hackathon Datos e IA 2025" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="input-descripcion">Descripción *</label>
              <textarea class="form-textarea" id="input-descripcion" rows="4"
                        placeholder="Describí el evento, actividades y requisitos..." required></textarea>
            </div>

            <div class="grid-2" style="gap:var(--space-md);">
              <div class="form-group">
                <label class="form-label" for="input-fecha-inicio">Fecha y hora de inicio *</label>
                <input class="form-input" type="datetime-local" id="input-fecha-inicio" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-fecha-fin">Fecha y hora de fin *</label>
                <input class="form-input" type="datetime-local" id="input-fecha-fin" required>
              </div>
            </div>

            <div class="grid-2" style="gap:var(--space-md);">
              <div class="form-group">
                <label class="form-label" for="input-lugar">Lugar *</label>
                <input class="form-input" type="text" id="input-lugar"
                       placeholder="Ej: Aula Magna" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-cupo">Cupo máximo *</label>
                <input class="form-input" type="number" id="input-cupo"
                       min="1" max="500" placeholder="Ej: 50" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="input-estado">Estado</label>
              <select class="form-select" id="input-estado">
                <option value="abierto">✅ Abierto — acepta inscripciones</option>
                <option value="cerrado">🔒 Cerrado — sin inscripciones</option>
                <option value="finalizado">🏁 Finalizado</option>
              </select>
            </div>

            <div style="display:flex; gap:var(--space-sm); justify-content:flex-end;">
              <button type="button" class="btn btn--ghost" onclick="cerrarFormulario()">Cancelar</button>
              <button type="submit" class="btn btn--primary" id="btn-guardar">Crear evento</button>
            </div>
          </form>
        </div>

        <!-- Lista de eventos -->
        <h3 style="font-size:16px; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-md);">
          Eventos creados
        </h3>

        <div class="filters-bar">
          <span class="filters-bar__label">Estado:</span>
          <button class="btn btn--sm btn--accent" data-filtro="todos"     onclick="filtrar('todos')">Todos</button>
          <button class="btn btn--sm btn--ghost"  data-filtro="abierto"   onclick="filtrar('abierto')">✅ Abiertos</button>
          <button class="btn btn--sm btn--ghost"  data-filtro="cerrado"   onclick="filtrar('cerrado')">🔒 Cerrados</button>
          <button class="btn btn--sm btn--ghost"  data-filtro="finalizado" onclick="filtrar('finalizado')">🏁 Finalizados</button>
        </div>

        <div id="contenedor-eventos" class="stack" style="margin-top:var(--space-md);"></div>
      </div>

      <!-- Sidebar -->
      <div>
        <div class="card" style="margin-bottom:var(--space-md);">
          <h3 style="font-size:15px; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-md);">
            📊 Resumen
          </h3>
          <div id="stats-eventos" class="stack--sm"></div>
        </div>

        <div class="card">
          <h3 style="font-size:15px; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-md);">
            👥 Inscriptos por evento
          </h3>
          <div id="inscriptos-resumen" class="stack--sm"></div>
        </div>
      </div>

    </div>

    <!-- Modal de inscriptos -->
    <div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
         z-index:200; align-items:center; justify-content:center; padding:20px;">
      <div style="background:var(--color-surface); border-radius:var(--radius-lg); max-width:560px;
           width:100%; padding:var(--space-xl); box-shadow:var(--shadow-lg); position:relative; max-height:80vh; overflow-y:auto;">
        <button onclick="cerrarModal()" style="position:absolute;top:16px;right:16px;font-size:20px;
                background:none;border:none;cursor:pointer;color:var(--color-text-muted);">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>

  </main>

  <script src="../../js/auth.js"></script>
  <script src="../../js/router.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script>
    Router.verificarAcceso();
    Auth.requiereRol('admin', 'delegado');
    Router.renderNavbar();

    const usuario = Auth.getUsuario();
    let eventos = [];
    let inscripciones = [];
    let filtroActivo = 'todos';

    async function iniciar() {
      [eventos, inscripciones] = await Promise.all([
        API.getEventos(),
        API.getInscripciones()
      ]);
      renderStats();
      renderInscriptosResumen();
      renderEventos(eventos);
    }

    function inscriptosDeEvento(eventoId) {
      return inscripciones.filter(i => i.evento_id === eventoId).length;
    }

    function renderStats() {
      document.getElementById('stats-eventos').innerHTML = [
        `<div class="flex-between"><span style="font-size:13px;">Total eventos</span><strong>${eventos.length}</strong></div>`,
        `<div class="flex-between"><span style="font-size:13px;">✅ Abiertos</span><strong>${eventos.filter(e=>e.estado==='abierto').length}</strong></div>`,
        `<div class="flex-between"><span style="font-size:13px;">🏁 Finalizados</span><strong>${eventos.filter(e=>e.estado==='finalizado').length}</strong></div>`,
        `<div class="flex-between"><span style="font-size:13px;">👥 Total inscriptos</span><strong>${inscripciones.length}</strong></div>`
      ].join('');
    }

    function renderInscriptosResumen() {
      document.getElementById('inscriptos-resumen').innerHTML = eventos.map(e => {
        const count = inscriptosDeEvento(e.id);
        const porcentaje = Math.round((count / e.cupo) * 100);
        return `
          <div>
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-size:12px; font-weight:500;">${Utils.truncar(e.titulo, 30)}</span>
              <span style="font-size:12px; color:var(--color-text-muted);">${count}/${e.cupo}</span>
            </div>
            <div style="height:6px; background:var(--color-border); border-radius:3px; overflow:hidden;">
              <div style="height:100%; width:${porcentaje}%;
                background:${porcentaje >= 90 ? 'var(--color-danger)' : porcentaje >= 60 ? 'var(--color-warning)' : 'var(--color-success)'};
                border-radius:3px; transition:width .3s;"></div>
            </div>
          </div>`;
      }).join('');
    }

    function filtrar(estado) {
      filtroActivo = estado;
      document.querySelectorAll('[data-filtro]').forEach(btn => {
        btn.className = btn.dataset.filtro === estado ? 'btn btn--sm btn--accent' : 'btn btn--sm btn--ghost';
      });
      const resultado = estado === 'todos' ? eventos : eventos.filter(e => e.estado === estado);
      renderEventos(resultado);
    }

    function renderEventos(lista) {
      const contenedor = document.getElementById('contenedor-eventos');
      if (lista.length === 0) {
        contenedor.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🗓️</div>
          <div class="empty-state__title">Sin eventos</div></div>`;
        return;
      }
      contenedor.innerHTML = lista.map(e => {
        const count = inscriptosDeEvento(e.id);
        const porcentaje = Math.round((count / e.cupo) * 100);
        return `
          <div class="card">
            <div class="flex-between" style="margin-bottom:8px;">
              <h4 style="font-size:15px; font-weight:600;">${e.titulo}</h4>
              <span class="badge badge--${e.estado}">${Utils.capitalizar(e.estado)}</span>
            </div>
            <p class="card__body" style="margin-bottom:12px;">${Utils.truncar(e.descripcion, 100)}</p>
            <div class="card__meta" style="margin-bottom:12px;">
              <span>📅 ${Utils.formatearFecha(e.fecha_inicio)}</span>
              <span>📍 ${e.lugar}</span>
              <span>👥 ${count} / ${e.cupo} inscriptos (${porcentaje}%)</span>
            </div>
            <!-- Barra de ocupación -->
            <div style="height:6px; background:var(--color-border); border-radius:3px; overflow:hidden; margin-bottom:12px;">
              <div style="height:100%; width:${porcentaje}%;
                background:${porcentaje >= 90 ? 'var(--color-danger)' : porcentaje >= 60 ? 'var(--color-warning)' : 'var(--color-success)'};
                border-radius:3px;"></div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="btn btn--ghost btn--sm" onclick="editarEvento(${e.id})">✏️ Editar</button>
              <button class="btn btn--ghost btn--sm" onclick="verInscriptos(${e.id})">👥 Ver inscriptos</button>
              <select class="form-select" style="padding:5px 8px; font-size:12px; width:150px;"
                onchange="cambiarEstado(${e.id}, this.value)">
                <option value="abierto"    ${e.estado==='abierto'    ? 'selected':''}>✅ Abierto</option>
                <option value="cerrado"    ${e.estado==='cerrado'    ? 'selected':''}>🔒 Cerrado</option>
                <option value="finalizado" ${e.estado==='finalizado' ? 'selected':''}>🏁 Finalizado</option>
              </select>
              <button class="btn btn--ghost btn--sm" style="color:var(--color-danger);border-color:var(--color-danger);"
                onclick="eliminarEvento(${e.id})">🗑 Eliminar</button>
            </div>
          </div>`;
      }).join('');
    }

    function abrirFormulario() {
      document.getElementById('form-titulo').textContent = 'Nuevo evento';
      document.getElementById('btn-guardar').textContent = 'Crear evento';
      document.getElementById('input-id').value = '';
      document.getElementById('form-evento').reset();
      document.getElementById('panel-formulario').style.display = 'block';
      document.getElementById('panel-formulario').scrollIntoView({ behavior: 'smooth' });
    }

    function cerrarFormulario() {
      document.getElementById('panel-formulario').style.display = 'none';
    }

    function editarEvento(id) {
      const e = eventos.find(e => e.id === id);
      if (!e) return;
      document.getElementById('form-titulo').textContent = 'Editar evento';
      document.getElementById('btn-guardar').textContent = 'Guardar cambios';
      document.getElementById('input-id').value = e.id;
      document.getElementById('input-titulo').value = e.titulo;
      document.getElementById('input-descripcion').value = e.descripcion;
      document.getElementById('input-fecha-inicio').value = e.fecha_inicio.slice(0,16);
      document.getElementById('input-fecha-fin').value = e.fecha_fin.slice(0,16);
      document.getElementById('input-lugar').value = e.lugar;
      document.getElementById('input-cupo').value = e.cupo;
      document.getElementById('input-estado').value = e.estado;
      document.getElementById('panel-formulario').style.display = 'block';
      document.getElementById('panel-formulario').scrollIntoView({ behavior: 'smooth' });
    }

    function cambiarEstado(id, nuevoEstado) {
      const e = eventos.find(e => e.id === id);
      if (!e) return;
      e.estado = nuevoEstado;
      Utils.mostrarAlerta(`Estado de "${e.titulo}" cambiado a ${Utils.capitalizar(nuevoEstado)}.`, 'success');
      renderStats();
      filtrar(filtroActivo);
    }

    function eliminarEvento(id) {
      const e = eventos.find(e => e.id === id);
      if (!confirm(`¿Eliminar "${e.titulo}"? También se eliminarán las inscripciones.`)) return;
      eventos = eventos.filter(e => e.id !== id);
      inscripciones = inscripciones.filter(i => i.evento_id !== id);
      Utils.mostrarAlerta('Evento eliminado.', 'warning');
      renderStats();
      renderInscriptosResumen();
      filtrar(filtroActivo);
    }

    async function verInscriptos(eventoId) {
      const e = eventos.find(e => e.id === eventoId);
      const usuarios = await API.getUsuarios();
      const inscritos = inscripciones
        .filter(i => i.evento_id === eventoId)
        .map(i => ({ ...i, usuario: usuarios.find(u => u.id === i.usuario_id) }))
        .filter(i => i.usuario);

      document.getElementById('modal-body').innerHTML = `
        <h2 style="font-size:18px; font-weight:700; color:var(--color-primary); margin-bottom:4px;">
          👥 Inscriptos — ${e.titulo}
        </h2>
        <p style="font-size:13px; color:var(--color-text-muted); margin-bottom:16px;">
          ${inscritos.length} de ${e.cupo} lugares ocupados
        </p>
        ${inscritos.length === 0
          ? '<p style="color:var(--color-text-muted); font-size:14px;">Nadie se inscribió todavía.</p>'
          : `<div class="table-wrapper"><table class="table">
              <thead><tr><th>#</th><th>Nombre</th><th>Email</th><th>Fecha inscripción</th></tr></thead>
              <tbody>
                ${inscritos.map((i, idx) => `
                  <tr>
                    <td style="color:var(--color-text-muted);">${idx + 1}</td>
                    <td>
                      <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:30px;height:30px;border-radius:50%;background:var(--color-primary);
                          color:#fff;display:flex;align-items:center;justify-content:center;
                          font-size:11px;font-weight:700;">${i.usuario.avatar}</div>
                        ${i.usuario.nombre}
                      </div>
                    </td>
                    <td style="font-size:12px;color:var(--color-text-muted);">${i.usuario.email}</td>
                    <td style="font-size:12px;color:var(--color-text-muted);">${Utils.formatearFecha(i.fecha_inscripcion)}</td>
                  </tr>`).join('')}
              </tbody>
            </table></div>`}
        <div style="margin-top:16px;">
          <button class="btn btn--ghost btn--sm" onclick="exportarCSV(${eventoId})">⬇ Exportar lista</button>
        </div>
      `;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function exportarCSV(eventoId) {
      Utils.mostrarAlerta('La exportación estará disponible en el 2do semestre con el backend.', 'info');
    }

    function cerrarModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) cerrarModal();
    });

    document.getElementById('form-evento').addEventListener('submit', (e) => {
      e.preventDefault();
      ['input-titulo','input-descripcion','input-fecha-inicio','input-fecha-fin','input-lugar','input-cupo']
        .forEach(id => Utils.limpiarError(id));

      const id          = document.getElementById('input-id').value;
      const titulo      = document.getElementById('input-titulo').value.trim();
      const descripcion = document.getElementById('input-descripcion').value.trim();
      const fechaInicio = document.getElementById('input-fecha-inicio').value;
      const fechaFin    = document.getElementById('input-fecha-fin').value;
      const lugar       = document.getElementById('input-lugar').value.trim();
      const cupo        = parseInt(document.getElementById('input-cupo').value);
      const estado      = document.getElementById('input-estado').value;

      let valido = true;
      if (!titulo)      { Utils.mostrarError('input-titulo', 'Requerido.');     valido = false; }
      if (!descripcion) { Utils.mostrarError('input-descripcion', 'Requerido.'); valido = false; }
      if (!fechaInicio) { Utils.mostrarError('input-fecha-inicio', 'Requerido.'); valido = false; }
      if (!fechaFin)    { Utils.mostrarError('input-fecha-fin', 'Requerido.');   valido = false; }
      if (fechaFin && fechaInicio && fechaFin <= fechaInicio) {
        Utils.mostrarError('input-fecha-fin', 'La fecha de fin debe ser posterior al inicio.');
        valido = false;
      }
      if (!lugar)       { Utils.mostrarError('input-lugar', 'Requerido.');      valido = false; }
      if (!cupo || cupo < 1) { Utils.mostrarError('input-cupo', 'Ingresá un cupo válido.'); valido = false; }
      if (!valido) return;

      if (id) {
        const ev = eventos.find(e => e.id === parseInt(id));
        Object.assign(ev, { titulo, descripcion, fecha_inicio: fechaInicio, fecha_fin: fechaFin, lugar, cupo, estado });
        Utils.mostrarAlerta('Evento actualizado correctamente.', 'success');
      } else {
        eventos.unshift({
          id: Utils.nuevoId(eventos),
          titulo, descripcion,
          fecha_inicio: fechaInicio,
          fecha_fin: fechaFin,
          lugar, cupo, estado,
          autor_id: usuario.id,
          imagen: null
        });
        Utils.mostrarAlerta('Evento creado correctamente.', 'success');
      }

      cerrarFormulario();
      renderStats();
      renderInscriptosResumen();
      filtrar(filtroActivo);
    });

    iniciar();
  </script>
  <script src="../../js/chatbot.js"></script>
  <script>Chatbot.init();</script>
</body>
</html>
