<!DOCTYPE html>
<html lang="es">

<head>

  <!-- META -->
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- TITULO -->
  <title>
    Login | Centro de Estudiantes
  </title>

  <!-- CSS RESET -->
  <link
    rel="stylesheet"
    href="../../css/reset.css"
  >

  <!-- CSS VARIABLES -->
  <link
    rel="stylesheet"
    href="../../css/variables.css"
  >

  <!-- CSS LOGIN -->
  <link
    rel="stylesheet"
    href="../../css/login.css"
  >

</head>

<body>

  <!-- CONTENEDOR LOGIN -->
  <section class="login-container">

    <!-- FORMULARIO -->
    <form id="loginForm">

      <!-- TITULO -->
      <h1 class="login-title">
        CE Digital
      </h1>

      <!-- SUBTITULO -->
      <p class="login-subtitle">
        Centro de Estudiantes - Instituto Superior N°57
      </p>

      <!-- USUARIO -->
      <div class="input-group">

        <label for="usuario">
          Usuario
        </label>

        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Ingresar usuario"
          autocomplete="username"
          required
        >

      </div>

      <!-- PASSWORD -->
      <div class="input-group">

        <label for="password">
          Contraseña
        </label>

        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingresar contraseña"
          autocomplete="current-password"
          required
        >

      </div>

      <!-- PERFIL -->
      <div class="input-group">

        <label for="rol">
          Perfil
        </label>

        <select
          id="rol"
          name="rol"
          required
        >

          <option value="">
            Seleccionar perfil
          </option>

          <option value="estudiante">
            Estudiante
          </option>

          <option value="docente">
            Docente
          </option>

          <option value="delegado">
            Delegado
          </option>

          <option value="admin">
            Administrador
          </option>

        </select>

      </div>

      <!-- BOTON LOGIN -->
      <button
        type="submit"
        class="btn-login"
      >

        Ingresar al Campus

      </button>

    </form>

  </section>

  <!-- JAVASCRIPT LOGIN -->
  <script
    src="../../js/auth.js"
    defer
  ></script>

</body>
</html>
