<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Centro de Estudiantes</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/login.css">
</head>
<body>
  <section class="login-container">
    <form id="loginForm">
      <h1 class="login-title">CE Digital</h1>
      <p class="login-subtitle">Centro de Estudiantes - Instituto Superior N°57</p>

      <div class="input-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="Ingresar usuario" autocomplete="username" required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresar contraseña" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-login">Ingresar al Campus</button>
    </form>
  </section>

  <!-- SweetAlert2 (debe cargarse antes de auth.js) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Tu script de login -->
  <script src="../../js/auth.js" defer></script>
</body>
</html>
