<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Institucional | CE Digital</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/variables.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      font-family:Arial, Helvetica, sans-serif;

      overflow:hidden;

      background:
      radial-gradient(circle at top left, #2563eb 0%, transparent 30%),
      radial-gradient(circle at bottom right, #0f766e 0%, transparent 30%),
      linear-gradient(135deg, #020617, #0f172a);

      color:white;
      position:relative;
    }

    /* FONDO EFECTOS */

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.25;
      z-index:0;
    }

    .circle-1{
      width:300px;
      height:300px;
      background:#3b82f6;
      top:-100px;
      left:-100px;
    }

    .circle-2{
      width:250px;
      height:250px;
      background:#06b6d4;
      bottom:-100px;
      right:-100px;
    }

    /* CONTENEDOR */

    .login-container{
      width:100%;
      padding:20px;

      display:flex;
      align-items:center;
      justify-content:center;

      position:relative;
      z-index:2;
    }

    /* CARD */

    .login-card{

      width:100%;
      max-width:450px;

      padding:45px;

      border-radius:30px;

      background:rgba(15,23,42,.75);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,.08);

      box-shadow:
      0 15px 40px rgba(0,0,0,.45),
      0 0 25px rgba(59,130,246,.15);

      transform-style:preserve-3d;

      animation:cardFloat 5s ease-in-out infinite;
    }

    @keyframes cardFloat{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    /* LOGO */

    .logo-area{
      text-align:center;
      margin-bottom:35px;
    }

    .logo-icon{

      width:85px;
      height:85px;

      margin:auto;
      margin-bottom:18px;

      border-radius:50%;

      background:linear-gradient(135deg,#3b82f6,#06b6d4);

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:2rem;
      font-weight:bold;

      box-shadow:
      0 10px 30px rgba(59,130,246,.4);
    }

    .logo-area h1{
      font-size:1.8rem;
      margin-bottom:8px;
    }

    .logo-area p{
      color:#cbd5e1;
      font-size:.95rem;
    }

    /* HEADER */

    .login-header{
      text-align:center;
      margin-bottom:30px;
    }

    .login-header h2{
      font-size:2rem;
      margin-bottom:10px;
      color:#f8fafc;
    }

    .login-header span{
      color:#94a3b8;
      font-size:.95rem;
    }

    /* INPUTS */

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:.92rem;
      color:#cbd5e1;
    }

    .input-group input,
    .input-group select{

      width:100%;

      padding:16px;

      border-radius:14px;

      border:1px solid rgba(255,255,255,.08);

      background:rgba(255,255,255,.05);

      color:white;

      outline:none;

      transition:.3s;
    }

    .input-group input:focus,
    .input-group select:focus{

      border-color:#3b82f6;

      box-shadow:
      0 0 15px rgba(59,130,246,.35);
    }

    .input-group input::placeholder{
      color:#94a3b8;
    }

    select option{
      color:black;
    }

    /* OPCIONES */

    .extra-options{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:25px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;

      color:#cbd5e1;
      font-size:.9rem;
    }

    /* BOTON */

    .btn-login{

      width:100%;

      padding:16px;

      border:none;

      border-radius:16px;

      background:
      linear-gradient(135deg,#2563eb,#06b6d4);

      color:white;

      font-size:1rem;
      font-weight:bold;

      cursor:pointer;

      transition:.3s;

      box-shadow:
      0 10px 25px rgba(37,99,235,.35);
    }

    .btn-login:hover{

      transform:translateY(-3px);

      box-shadow:
      0 15px 35px rgba(37,99,235,.5);
    }

    /* FOOTER */

    .login-footer{
      text-align:center;
      margin-top:25px;
    }

    .volver{

      color:#93c5fd;

      text-decoration:none;

      transition:.3s;
    }

    .volver:hover{
      color:white;
    }

    /* RESPONSIVE */

    @media(max-width:600px){

      .login-card{
        padding:30px;
      }

      .logo-area h1{
        font-size:1.5rem;
      }

      .login-header h2{
        font-size:1.6rem;
      }

    }

  </style>

</head>

<body>

  <!-- EFECTOS -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <!-- LOGIN -->
  <main class="login-container">

    <section class="login-card">

      <!-- LOGO -->
      <div class="logo-area">

        <div class="logo-icon">
          CE
        </div>

        <h1>
          Instituto Superior N°57
        </h1>

        <p>
          Centro de Estudiantes Digital
        </p>

      </div>

      <!-- HEADER -->
      <div class="login-header">

        <h2>
          Iniciar Sesión
        </h2>

        <span>
          Accedé a la plataforma institucional
        </span>

      </div>

      <!-- FORM -->
      <form id="loginForm">

        <!-- USUARIO -->
        <div class="input-group">

          <label for="usuario">
            Usuario
          </label>

          <input
            type="text"
            id="usuario"
            placeholder="Ingresar usuario"
            required
          >

        </div>

        <!-- PASSWORD -->
        <div class="input-group">

          <label for="password">
            Contraseña
          </label>

          <input
            type="password"
            id="password"
            placeholder="Ingresar contraseña"
            required
          >

        </div>

        <!-- ROL -->
        <div class="input-group">

          <label for="rol">
            Perfil
          </label>

          <select id="rol" required>

            <option value="">
              Seleccionar perfil
            </option>

            <option value="estudiante">
              Estudiante
            </option>

            <option value="docente">
              Docente
            </option>

            <option value="delegado">
              Delegado
            </option>

            <option value="admin">
              Administrador
            </option>

          </select>

        </div>

        <!-- OPCIONES -->
        <div class="extra-options">

          <label class="remember">

            <input type="checkbox">

            <span>
              Recordarme
            </span>

          </label>

        </div>

        <!-- BOTON -->
        <button type="submit" class="btn-login">

          Ingresar al Campus

        </button>

      </form>

      <!-- FOOTER -->
      <div class="login-footer">

        <a href="../../index.html" class="volver">

          ← Volver al inicio

        </a>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="../../js/auth.js"></script>

</body>
</html>
